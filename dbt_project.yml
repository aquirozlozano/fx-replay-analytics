name: "fx_replay_analytics"
version: "1.0.0"
config-version: 2

profile: "fx_replay_analytics"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  fx_replay_analytics:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +tags: ["layer:staging"]
      _legacy:
        +enabled: false
      billing:
        +tags: ["domain:billing"]
      marketing:
        +tags: ["domain:marketing"]
      product:
        +tags: ["domain:product"]
    intermediate:
      +materialized: view
      +tags: ["layer:intermediate"]
      subscriptions:
        +tags: ["domain:subscriptions"]
      attribution:
        +tags: ["domain:attribution"]
    marts:
      +materialized: table
      +tags: ["layer:marts"]
      subscriptions:
        +tags: ["domain:subscriptions"]
      growth:
        +tags: ["domain:growth"]

seeds:
  fx_replay_analytics:
    +quote_columns: false

vars:
  reporting_timezone: "UTC"
  eod_incremental_lookback_days: 60
  reactivation_window_days: 60
  attribution_lookback_days: 30
  ltv_window_days: 30
