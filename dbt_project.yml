name: "fx_replay_analytics"
version: "1.0.0"
config-version: 2

profile: "fx_replay_analytics"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  fx_replay_analytics:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +tags: ["layer:staging"]
      _legacy:
        +enabled: false
      shared:
        +tags: ["area:shared", "domain:shared"]
      billing:
        +tags: ["area:finance", "domain:billing"]
      marketing:
        +tags: ["area:marketing", "domain:marketing"]
      product:
        +tags: ["area:product", "domain:product"]
      sales:
        +tags: ["area:sales", "domain:sales"]
      account_management:
        +tags: ["area:account_management", "domain:account_management"]
      finance:
        +tags: ["area:finance", "domain:finance"]
      support:
        +tags: ["area:support", "domain:support"]
    intermediate:
      +materialized: view
      +tags: ["layer:intermediate"]
      shared:
        +tags: ["area:shared", "domain:shared"]
      subscriptions:
        +tags: ["area:account_management", "domain:subscriptions"]
      attribution:
        +tags: ["area:marketing", "domain:attribution"]
      sales:
        +tags: ["area:sales", "domain:sales"]
      marketing:
        +tags: ["area:marketing", "domain:marketing"]
      account_management:
        +tags: ["area:account_management", "domain:account_management"]
      finance:
        +tags: ["area:finance", "domain:finance"]
      support:
        +tags: ["area:support", "domain:support"]
    marts:
      +materialized: table
      +tags: ["layer:marts"]
      subscriptions:
        +tags: ["area:account_management", "domain:subscriptions"]
      growth:
        +tags: ["area:marketing", "domain:growth"]
      sales:
        +tags: ["area:sales", "domain:sales"]
      marketing:
        +tags: ["area:marketing", "domain:marketing"]
      account_management:
        +tags: ["area:account_management", "domain:account_management"]
      finance:
        +tags: ["area:finance", "domain:finance"]
      support:
        +tags: ["area:support", "domain:support"]
      executive:
        +tags: ["area:executive", "domain:executive"]

seeds:
  fx_replay_analytics:
    +quote_columns: false

vars:
  reporting_timezone: "UTC"
  eod_incremental_lookback_days: 60
  reactivation_window_days: 60
  attribution_lookback_days: 30
  ltv_window_days: 30
