version: 2

models:
  - name: stg_ga4_events
    columns:
      - name: user_id
        tests: [not_null]
      - name: event_name
        tests:
          - not_null
          - accepted_values:
              values: ['signup', 'start_trial', 'purchase']

  - name: stg_chargebee_subscriptions
    columns:
      - name: subscription_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['trialing', 'active', 'cancelled', 'non_renewing']
      - name: updated_at
        tests: [not_null]

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: type
        tests:
          - accepted_values:
              values: ['purchase']

  - name: stg_marketing_spend
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['spend_date', 'campaign']
    columns:
      - name: spend_date
        tests: [not_null]
      - name: campaign
        tests: [not_null]
      - name: cost
        tests: [not_null]

