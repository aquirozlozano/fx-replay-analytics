version: 2

models:
  - name: stg_marketing_spend
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['spend_date', 'campaign']
    columns:
      - name: spend_date
        tests: [not_null]
      - name: campaign
        tests: [not_null]
      - name: cost
        tests: [not_null]
