version: 2

models:
  - name: stg_chargebee_subscriptions
    columns:
      - name: subscription_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['trialing', 'active', 'cancelled', 'non_renewing']
      - name: updated_at
        tests: [not_null]

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: type
        tests:
          - accepted_values:
              values: ['purchase']
